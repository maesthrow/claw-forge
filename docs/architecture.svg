<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#999"/>
    </marker>
    <marker id="a2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="300" fill="#fff" rx="8"/>

  <!-- Main flow line -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#eee" stroke-width="2"/>

  <!-- User -->
  <circle cx="40" cy="130" r="18" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>
  <text x="40" y="135" text-anchor="middle" font-size="16">👤</text>
  <text x="40" y="165" text-anchor="middle" font-size="10" fill="#999">Telegram</text>

  <!-- Arrow -->
  <line x1="58" y1="130" x2="88" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Architect -->
  <rect x="92" y="112" width="90" height="36" rx="18" fill="#f0ebf8" stroke="#c4b5d9" stroke-width="1.2"/>
  <text x="137" y="134" text-anchor="middle" font-size="12" font-weight="500" fill="#5a4178">Architect</text>

  <line x1="182" y1="130" x2="212" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Analyst -->
  <rect x="216" y="112" width="80" height="36" rx="6" fill="#f8f9fb" stroke="#d0d7e2" stroke-width="1.2"/>
  <text x="256" y="134" text-anchor="middle" font-size="12" fill="#4a5568">Analyst</text>

  <line x1="296" y1="130" x2="326" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Developer -->
  <rect x="330" y="112" width="86" height="36" rx="6" fill="#f8f9fb" stroke="#d0d7e2" stroke-width="1.2"/>
  <text x="373" y="134" text-anchor="middle" font-size="12" fill="#4a5568">Developer</text>

  <line x1="416" y1="130" x2="446" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Reviewer -->
  <rect x="450" y="112" width="82" height="36" rx="6" fill="#f8f9fb" stroke="#d0d7e2" stroke-width="1.2"/>
  <text x="491" y="134" text-anchor="middle" font-size="12" fill="#4a5568">Reviewer</text>

  <!-- Retry arc Reviewer → Developer -->
  <path d="M460,112 C460,80 383,80 383,112" fill="none" stroke="#c4b5d9" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a1)"/>
  <text x="420" y="78" text-anchor="middle" font-size="9" fill="#a090b8">retry ×3</text>

  <line x1="532" y1="130" x2="562" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Deploy -->
  <rect x="566" y="112" width="72" height="36" rx="6" fill="#fdf6ee" stroke="#e2cfa8" stroke-width="1.2"/>
  <text x="602" y="134" text-anchor="middle" font-size="12" font-weight="500" fill="#8a6d3b">Deploy</text>

  <line x1="638" y1="130" x2="668" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Tester -->
  <rect x="672" y="112" width="72" height="36" rx="6" fill="#f0faf2" stroke="#a8d9b0" stroke-width="1.2"/>
  <text x="708" y="134" text-anchor="middle" font-size="12" fill="#3a7a4a">Tester</text>

  <!-- Retry arc Tester → Developer -->
  <path d="M690,148 C690,200 383,200 383,148" fill="none" stroke="#a8d9b0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a1)"/>
  <text x="536" y="210" text-anchor="middle" font-size="9" fill="#6ab07a">retry ×2</text>

  <line x1="744" y1="130" x2="774" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Result -->
  <circle cx="790" cy="130" r="16" fill="#f0faf2" stroke="#6ab07a" stroke-width="1.5"/>
  <text x="790" y="135" text-anchor="middle" font-size="14">✓</text>
  <text x="790" y="165" text-anchor="middle" font-size="10" fill="#999">Ready</text>

  <!-- Deploy → OpenClaw -->
  <line x1="602" y1="148" x2="602" y2="248" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#a2)"/>

  <!-- OpenClaw zone -->
  <rect x="500" y="252" width="340" height="38" rx="6" fill="#f0f7ff" stroke="#b8d4f0" stroke-width="1"/>
  <text x="520" y="275" font-size="11" fill="#4a7aaa">⚡ OpenClaw</text>
  <text x="620" y="275" font-size="11" fill="#7a9abb">Gateway</text>
  <text x="690" y="275" font-size="10" fill="#aaa">→</text>
  <text x="710" y="275" font-size="11" fill="#7a9abb">🤖 Bots</text>
  <text x="780" y="275" font-size="10" fill="#aaa">→</text>
  <text x="810" y="275" font-size="11" fill="#7a9abb">Users</text>

  <!-- Labels -->
  <text x="216" y="100" font-size="9" fill="#bbb">1</text>
  <text x="330" y="100" font-size="9" fill="#bbb">2</text>
  <text x="450" y="100" font-size="9" fill="#bbb">3</text>
  <text x="672" y="100" font-size="9" fill="#bbb">4</text>
</svg>
